# Build the app and publish the static dist/ to GitHub Pages. The result is a
# live bring-your-own-key demo: the visitor pastes their own Anthropic key and
# runs a real audit. No secret is stored in this workflow, because the app holds
# no server-side key.
#
# Trigger is manual (workflow_dispatch) on purpose. Deploy is a pre-public step,
# and the repo is private for now, so this does not run on every push to main.
# Publishing Pages from a private repo also needs a paid plan. When the repo goes
# public and Pages is enabled (Settings, Pages, Source: GitHub Actions), add the
# push trigger back:
#
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
